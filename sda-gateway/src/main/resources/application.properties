spring.application.name=sda-gateway
server.port=8007

spring.cloud.gateway.server.webflux.httpclient.wiretap=true
spring.cloud.gateway.server.webflux.httpserver.wiretap=true
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=DEBUG
logging.level.reactor.netty.channel.FluxReceive=DEBUG

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.loadbalancer.configurations=health-check
